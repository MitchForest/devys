# Periphery Configuration for Devys
# https://github.com/peripheryapp/periphery

# Xcode project + schemes (so `periphery scan` works from repo root)
project: Devys.xcodeproj
schemes:
  - ios-client
  - mac-client
  - assistant-ios
  - assistant-mac

# Retain public declarations (library code may be used by consumers)
retain_public: true

# Retain @objc and @objcMembers annotated declarations
retain_objc_annotated: true

# Retain assign-only properties (sometimes used for debugging)
retain_assign_only_properties: false

# Output format
format: xcode

# Exclude test targets from indexing
exclude_tests: true

# Exclude source files matching these patterns from results
report_exclude:
  - "**/DerivedSources/**"
  - "**/.build/**"
  - "Packages/**/Tests/**"
