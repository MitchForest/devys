name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: macos-15
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install SwiftLint
        run: |
          brew list swiftlint >/dev/null 2>&1 || brew install swiftlint

      - name: Install Periphery
        run: |
          brew list periphery >/dev/null 2>&1 || brew install peripheryapp/periphery/periphery

      - name: Run SwiftLint
        run: ./scripts/lint.sh

      - name: Run design system gate
        run: ./scripts/check-design-system.sh

      - name: Run Periphery
        run: ./scripts/unused.sh

      - name: Run tree-sitter migration gate
        run: ./scripts/check-tree-sitter-migration.sh

      - name: Build mac-client
        run: DEVYS_SKIP_QUALITY_GATE=1 ./scripts/build-mac-client.sh

      - name: Test mac-client
        run: |
          DEVYS_SKIP_QUALITY_GATE=1 xcodebuild test \
            -project Devys.xcodeproj \
            -scheme mac-client \
            -destination "platform=macOS" \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
